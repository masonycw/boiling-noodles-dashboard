name: Deploy to Server

on:
  push:
    branches:
      - main
      - Backup

jobs:
  # ── 正式版 (main → Port 8501) ──────────────────────────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          echo "✅ SSH setup complete. Deploying PRODUCTION (main → 8501)..."
          
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          DEPLOY_DIR="$HOME/boiling-noodles-dashboard"
          cd "$DEPLOY_DIR"
          
          git fetch --all
          git reset --hard origin/main
          
          echo "Checking deployed version:"
          grep 'APP_VERSION' streamlit/config.py
          
          source venv/bin/activate
          pip install -r requirements.txt -q
          
          echo "Clearing Port 8501..."
          if [ -f streamlit.pid ]; then
            OLD_PID=$(cat streamlit.pid)
            if [ -n "$OLD_PID" ] && [ "$OLD_PID" != "0" ]; then
              kill $OLD_PID > /dev/null 2>&1 || true
            fi
            rm streamlit.pid
          fi
          fuser -k 8501/tcp > /dev/null 2>&1 || true
          sleep 2
          
          echo "Starting Streamlit on Port 8501..."
          nohup ./venv/bin/streamlit run streamlit/app.py \
            --server.port=8501 \
            --server.address=0.0.0.0 \
            --server.headless=true \
            --server.enableCORS=false \
            --server.enableXsrfProtection=false \
            > streamlit.log 2>&1 &
          echo $! > streamlit.pid
          
          sleep 5
          if netstat -tulpn | grep :8501 > /dev/null 2>&1 || fuser 8501/tcp > /dev/null 2>&1; then
             echo "✅ PRODUCTION 部署成功！Port 8501 上線。"
          else
             echo "❌ Streamlit 啟動失敗，請檢查日誌："
             tail -n 20 streamlit.log
             exit 1
          fi

          echo "🔄 重啟 ERP Backend (Port 8000)..."
          pkill -f "uvicorn erp.backend.main" > /dev/null 2>&1 || true
          fuser -k 8000/tcp > /dev/null 2>&1 || true
          sleep 2
          source erp/backend/venv/bin/activate
          pip install -r erp/backend/requirements.txt -q
          nohup erp/backend/venv/bin/uvicorn erp.backend.main:app \
            --host 0.0.0.0 --port 8000 \
            > erp_backend.log 2>&1 &
          echo $! > erp_backend.pid
          sleep 3
          if fuser 8000/tcp > /dev/null 2>&1; then
            echo "✅ ERP Backend 啟動成功！Port 8000 上線。"
          else
            echo "❌ ERP Backend 啟動失敗："
            tail -n 20 erp_backend.log
            exit 1
          fi
          ENDSSH

  # ── 備份版 (Backup → Port 8502) ───────────────────────────────────────
  deploy-test:
    if: github.ref == 'refs/heads/Backup'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          echo "💾 Deploying BACKUP (Backup → 8502)..."
          
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          DEPLOY_DIR="$HOME/boiling-noodles-dashboard-test"

          if [ ! -d "$DEPLOY_DIR" ]; then
            git clone https://github.com/masonycw/boiling-noodles-dashboard.git "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            python3 -m venv venv
          fi

          cd "$DEPLOY_DIR"
          git fetch --all
          git checkout Backup
          git reset --hard origin/Backup

          echo "Checking test version:"
          grep 'APP_VERSION' streamlit/config.py

          source venv/bin/activate
          pip install -r requirements.txt -q

          echo "Clearing old test process..."
          if [ -f streamlit_test.pid ]; then
            OLD_PID=$(cat streamlit_test.pid)
            if [ -n "$OLD_PID" ] && [ "$OLD_PID" != "0" ]; then
              kill $OLD_PID > /dev/null 2>&1 || true
            fi
            rm streamlit_test.pid
          fi
          fuser -k 8502/tcp > /dev/null 2>&1 || true
          sleep 1

          echo "Starting TEST Streamlit on Port 8502..."
          nohup ./venv/bin/streamlit run streamlit/app.py \
            --server.port=8502 \
            --server.address=0.0.0.0 \
            --server.headless=true \
            --server.enableCORS=false \
            --server.enableXsrfProtection=false \
            > streamlit_test.log 2>&1 &
          echo $! > streamlit_test.pid

          sleep 5
          if netstat -tulpn | grep :8502 > /dev/null; then
            echo "✅ TEST 部署成功！Port 8502 上線。"
            exit 0
          else
            echo "❌ 測試版啟動失敗，請檢查日誌："
            tail -n 20 streamlit_test.log
            exit 1
          fi
          ENDSSH
