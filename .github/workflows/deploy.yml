name: Deploy to Server

on:
  push:
    branches:
      - main
      - test
      - "V*"

jobs:
  # ── 正式版 (main → Port 8501) ──────────────────────────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          echo "✅ SSH setup complete. Deploying PRODUCTION (main → 8501)..."
          
          ssh "$SSH_USER@$SSH_HOST" "
            DEPLOY_DIR=~/boiling-noodles-dashboard
            cd \"\$DEPLOY_DIR\"
            
            git fetch --all
            git reset --hard origin/main
            
            echo 'Checking deployed version:'
            grep 'APP_VERSION' config.py
            
            source venv/bin/activate
            pip install -r requirements.txt -q
            
            echo 'Clearing Port 8501...'
            pkill -u \$(whoami) -f 'streamlit run' > /dev/null 2>&1 || true
            fuser -k 8501/tcp > /dev/null 2>&1 || true
            sleep 2
            
            echo 'Starting Streamlit on Port 8501...'
            nohup ./venv/bin/streamlit run app.py \
              --server.port=8501 \
              --server.address=0.0.0.0 \
              --server.headless=true \
              --server.enableCORS=false \
              --server.enableXsrfProtection=false \
              > streamlit.log 2>&1 &
            
            sleep 5
            if netstat -tulpn | grep :8501 > /dev/null; then
               echo '✅ PRODUCTION 部署成功！Port 8501 上線。'
               exit 0
            else
               echo '❌ 啟動失敗，請檢查日誌：'
               tail -n 20 streamlit.log
               exit 1
            fi
          "

  # ── 測試版 (test / V* → Port 8502) ─────────────────────────────────────
  deploy-test:
    if: github.ref == 'refs/heads/test' || startsWith(github.ref, 'refs/heads/V')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          echo "🧪 Deploying TEST (V0302 → 8502)..."
          
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
          DEPLOY_DIR="$HOME/boiling-noodles-dashboard-test"

          if [ ! -d "$DEPLOY_DIR" ]; then
            git clone https://github.com/masonycw/boiling-noodles-dashboard.git "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            python3 -m venv venv
          fi

          cd "$DEPLOY_DIR"
          git fetch --all
          BRANCH_NAME="${GITHUB_REF_NAME}"
          git checkout $BRANCH_NAME
          git reset --hard origin/$BRANCH_NAME

          echo "Checking test version:"
          grep 'APP_VERSION' config.py

          source venv/bin/activate
          pip install -r requirements.txt -q

          echo "Clearing old test process..."
          if [ -f streamlit_test.pid ]; then
            OLD_PID=$(cat streamlit_test.pid)
            kill $OLD_PID > /dev/null 2>&1 || true
            rm streamlit_test.pid
          fi
          sleep 1

          echo "Starting TEST Streamlit on Port 8502..."
          nohup ./venv/bin/streamlit run app.py \
            --server.port=8502 \
            --server.address=0.0.0.0 \
            --server.headless=true \
            --server.enableCORS=false \
            --server.enableXsrfProtection=false \
            > streamlit_test.log 2>&1 &
          echo $! > streamlit_test.pid

          sleep 5
          if netstat -tulpn | grep :8502 > /dev/null; then
            echo "✅ TEST 部署成功！Port 8502 上線。"
            exit 0
          else
            echo "❌ 測試版啟動失敗，請檢查日誌："
            tail -n 20 streamlit_test.log
            exit 1
          fi
          ENDSSH
